<div class="modal fade" id="cf">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content rounded">
            <div class="modal-body m-0 p-1">
                <div class="ratio ratio-16x9 rounded">
                    <video src="media/total.mp4" autoplay loop muted></video>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="warning">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content rounded">
            <div class="modal-body m-0 p-1">
                <div class="ratio ratio-16x9 rounded">

<script>
    window.addEventListener('load',function(){
        let cf=new bootstrap.Modal(document.querySelector('#cf'));
        // cf.show(); //暫時關閉
    })
    function golink(){
        window.open("https://docs.google.com/forms/d/e/1FAIpQLSet6EnkZTTsAEtLBTWZqek7RHpRxboOL0ZIHzLGddX6zE56YQ/viewform?usp=dialog",
            "_blank",
            "width=500 height=900"
        );
    }

    document.oncontextmenu=function(){
        showWarning();
        return false;
    }
    function showWarning(){
        let warning=new bootstrap.Modal(document.querySelector("#warning"));
        warning.show();
    }
    document.onkeydown=function(e){
        if(e.keyCode===17 || e.keyCode===85 || e.keyCode===123){
            showWarning();
            return false;
        }else{
            return true;
        }
    }
    // use js to show alert and show keyCode
    document.onkeydown=function(e){
        alert(e.keyCode)
    }

</script>
